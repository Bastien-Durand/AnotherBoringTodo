name: Frontend CI
on:
  push:
    branches: [main]
jobs:
  build-frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v5
      - name: Install dependencies
        run: npm install
        working-directory: frontend/todo-app
      - name: Build
        run: npm run build
        working-directory: frontend/todo-app
